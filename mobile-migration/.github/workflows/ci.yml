name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint · Typecheck · Test · Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      # ── Type-checking ───────────────────────────────────────────
      - name: Type Check
        run: npx tsc --noEmit --pretty

      # ── Linting (zero warnings allowed) ─────────────────────────
      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings=0

      # ── Unit + Integration Tests with coverage gate ─────────────
      - name: Run Tests
        run: npm test -- --coverage --passWithNoTests --ci
        env:
          CI: true

      # ── Web bundle + source-map analysis ────────────────────────
      - name: Build Web
        run: npx expo export --platform web

      # ── Performance Regression Check ────────────────────────────
      - name: Performance Budget Gate
        run: |
          # Check multiple possible bundle output paths
          BUNDLE_SIZE=$(du -sk dist/assets/*bundle*.js 2>/dev/null | cut -f1)
          if [ -z "$BUNDLE_SIZE" ]; then
            BUNDLE=$(find dist/_expo/static/js/web -name '*.js' -type f 2>/dev/null | head -1)
            if [ -z "$BUNDLE" ]; then echo "No bundle found — skipping size check"; exit 0; fi
            BUNDLE_SIZE=$(du -k "$BUNDLE" | cut -f1)
          fi
          echo "::notice::JS Bundle size: ${BUNDLE_SIZE}KB"
          if [ "$BUNDLE_SIZE" -gt 5120 ]; then
            echo "::error::❌ JS Bundle ${BUNDLE_SIZE}KB exceeds 5MB budget"
            exit 1
          fi
          echo "✅ Bundle within 5MB budget"

      # ── Upload coverage report ──────────────────────────────────
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mobile-app/coverage/
