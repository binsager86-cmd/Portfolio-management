name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint · Typecheck · Test · Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - run: npm ci

      # ── Type-checking ───────────────────────────────────────────
      - name: TypeScript
        run: npm run typecheck

      # ── Linting (zero warnings allowed) ─────────────────────────
      - name: ESLint
        run: npm run lint -- --max-warnings=0

      # ── Unit + Integration Tests with coverage gate ─────────────
      - name: Tests
        run: npm test -- --coverage --coverageThreshold='{"global":{"statements":80}}'

      # ── Web bundle + source-map analysis ────────────────────────
      - name: Bundle size analysis
        run: npm run analyze

      # ── Bundle size gate (fail if JS bundle > 5 MB) ─────────────
      - name: Bundle size check
        run: |
          BUNDLE=$(find dist/_expo/static/js/web -name '*.js' -type f 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then echo "No bundle found — skipping size check"; exit 0; fi
          SIZE_KB=$(du -k "$BUNDLE" | cut -f1)
          echo "Bundle size: ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 5120 ]; then
            echo "::error::Bundle size ${SIZE_KB} KB exceeds 5 MB limit"
            exit 1
          fi
