# ──────────────────────────────────────────────────────────────────────
# Standalone static-site deploy (frontend only, separate from backend).
# For the COMBINED app (frontend + backend on one domain),
# use mobile-migration/.do/app.yaml instead.
# ──────────────────────────────────────────────────────────────────────
name: portfolio-mobile-app

static_sites:
  - name: web
    github:
      repo: binsager86-cmd/Portfolio-Mobile-App
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build:web
    output_dir: dist
    environment_slug: node-js

    routes:
      - path: /

    # ⭐ SPA fallback — serves index.html for any unmatched path (fixes 404 on refresh)
    catchall_document: index.html

    envs:
      - key: EXPO_PUBLIC_API_URL
        value: "https://backend-api-app-hfc2n.ondigitalocean.app"
        scope: BUILD_TIME
      - key: EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID
        value: "549902495569-6kbcenrhcir2iqskj377fm561e8e6l50.apps.googleusercontent.com"
        scope: BUILD_TIME

    cors:
      allow_origins:
        - exact: "https://backend-api-app-hfc2n.ondigitalocean.app"
