openapi: 3.0.3
info:
  title: Portfolio API
  description: |
    Investment portfolio management API for KFH/BBYN/USA portfolios.
    Supports multi-user isolation, soft-delete, currency conversion (USD→KWD),
    and real-time Yahoo Finance price fetching.

    ## Authentication
    All endpoints (except /health, /api/v1/auth/login, /api/v1/cron/status)
    require a JWT Bearer token obtained via login.

    ## Versioning
    API is versioned via URL prefix `/api/v1/`.

    ## Currencies
    - KFH & BBYN portfolios: KWD
    - USA portfolio: USD
    - All aggregate totals converted to KWD
  version: 1.0.0
  contact:
    name: Sager Alsager
  license:
    name: Private

servers:
  - url: http://localhost:8002
    description: Local development
  - url: https://portfolio-api.onrender.com
    description: Production (Render)

tags:
  - name: System
    description: Health and status
  - name: Auth
    description: Authentication & user management
  - name: Portfolio
    description: Portfolio overview, holdings, accounts
  - name: Transactions
    description: Transaction CRUD (Buy/Sell/Dividend/Bonus/Deposit/Withdrawal)
  - name: Cash Deposits
    description: Cash deposit management with analysis toggle
  - name: Securities
    description: Securities master, aliases, symbol mappings
  - name: Snapshots
    description: Portfolio snapshots and performance (TWR/MWRR)
  - name: Prices
    description: Price fetching and history
  - name: AI Analyst
    description: Gemini-powered portfolio analysis
  - name: PFM
    description: Personal Financial Management (net worth tracking)
  - name: Peer Analysis
    description: Multi-stock financial comparison
  - name: Admin
    description: Backup, restore, integrity checks

# ──────────────────────────────────────────────
# SECURITY
# ──────────────────────────────────────────────
security:
  - BearerAuth: []

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────
paths:

  # ───── SYSTEM ─────

  /health:
    get:
      operationId: healthCheck
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ───── AUTH ─────

  /api/v1/auth/login:
    post:
      operationId: loginJson
      tags: [Auth]
      summary: User login (JSON)
      description: Rate-limited to 5 requests/minute per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/login/form:
    post:
      operationId: loginForm
      tags: [Auth]
      summary: User login (OAuth2 form)
      description: OAuth2-compatible form login. Rate-limited to 5/min.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/register:
    post:
      operationId: registerUser
      tags: [Auth]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/change-password:
    put:
      operationId: changePassword
      tags: [Auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── PORTFOLIO ─────

  /api/v1/portfolio/overview:
    get:
      operationId: getPortfolioOverview
      tags: [Portfolio]
      summary: Get complete portfolio overview
      description: |
        Returns aggregated overview across all portfolios including deposits,
        withdrawals, dividends, fees, ROI, and per-portfolio breakdowns.
        All monetary values in KWD.
      parameters:
        - name: portfolio
          in: query
          required: false
          schema:
            type: string
            enum: [KFH, BBYN, USA, all]
          description: Filter by portfolio name. Defaults to all.
      responses:
        "200":
          description: Portfolio overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioOverviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/portfolio/holdings:
    get:
      operationId: getHoldings
      tags: [Portfolio]
      summary: Get current holdings
      description: Returns current holdings with avg cost, P&L, dividends, and KWD conversions.
      parameters:
        - $ref: "#/components/parameters/PortfolioFilter"
      responses:
        "200":
          description: Holdings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/portfolio/table/{portfolio_name}:
    get:
      operationId: getPortfolioTable
      tags: [Portfolio]
      summary: Get holdings for a specific portfolio
      parameters:
        - name: portfolio_name
          in: path
          required: true
          schema:
            type: string
            enum: [KFH, BBYN, USA]
      responses:
        "200":
          description: Portfolio holdings table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioTableResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/portfolio/accounts:
    get:
      operationId: getAccounts
      tags: [Portfolio]
      summary: Get external account balances
      responses:
        "200":
          description: Account balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/portfolio/fx-rate:
    get:
      operationId: getFxRate
      tags: [Portfolio]
      summary: Get current USD→KWD exchange rate
      responses:
        "200":
          description: FX rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── TRANSACTIONS ─────

  /api/v1/transactions:
    get:
      operationId: listTransactions
      tags: [Transactions]
      summary: List transactions with filtering
      parameters:
        - $ref: "#/components/parameters/PortfolioFilter"
        - name: txn_type
          in: query
          schema:
            type: string
            enum: [BUY, SELL, DIVIDEND, BONUS, DEPOSIT, WITHDRAWAL]
        - name: stock_symbol
          in: query
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
            format: date
            example: "2024-01-01"
        - name: to_date
          in: query
          schema:
            type: string
            format: date
            example: "2026-12-31"
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: sort
          in: query
          schema:
            type: string
            enum: [txn_date, created_at, amount]
            default: txn_date
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createTransaction
      tags: [Transactions]
      summary: Create a new transaction
      description: |
        Creates a Buy, Sell, Dividend, Bonus, Deposit, or Withdrawal transaction.
        For stock transactions (BUY/SELL/DIVIDEND/BONUS), `stock_id` is required.
        For cash transactions (DEPOSIT/WITHDRAWAL), `stock_id` should be null.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCreate"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Validation error (e.g. selling more than held)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/transactions/{id}:
    get:
      operationId: getTransaction
      tags: [Transactions]
      summary: Get a single transaction
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateTransaction
      tags: [Transactions]
      summary: Update a transaction
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteTransaction
      tags: [Transactions]
      summary: Soft-delete a transaction
      description: Sets is_deleted=1, deleted_at=now. Recoverable for 30 days.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Transaction soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/transactions/{id}/restore:
    post:
      operationId: restoreTransaction
      tags: [Transactions]
      summary: Restore a soft-deleted transaction
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Transaction restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Transaction not deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/transactions/trash:
    get:
      operationId: listDeletedTransactions
      tags: [Transactions]
      summary: List soft-deleted transactions (trash)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Deleted transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/transactions/import:
    post:
      operationId: importTransactions
      tags: [Transactions]
      summary: Import transactions from Excel
      description: |
        Upload an Excel file with sheet "Transactions" (or first sheet).
        Required columns: company, txn_date, txn_type, shares.
        Optional: purchase_cost, sell_value, bonus_shares, cash_dividend, fees, broker, notes.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, portfolio]
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel file (.xlsx)
                portfolio:
                  type: string
                  enum: [KFH, BBYN, USA]
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Invalid file format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── CASH DEPOSITS ─────

  /api/v1/deposits:
    get:
      operationId: listDeposits
      tags: [Cash Deposits]
      summary: List cash deposits
      parameters:
        - $ref: "#/components/parameters/PortfolioFilter"
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createDeposit
      tags: [Cash Deposits]
      summary: Create a cash deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositCreate"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/deposits/{id}:
    get:
      operationId: getDeposit
      tags: [Cash Deposits]
      summary: Get a single deposit
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deposit detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateDeposit
      tags: [Cash Deposits]
      summary: Update a deposit
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositUpdate"
      responses:
        "200":
          description: Deposit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteDeposit
      tags: [Cash Deposits]
      summary: Soft-delete a deposit
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deposit soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/deposits/{id}/toggle-analysis:
    patch:
      operationId: toggleDepositAnalysis
      tags: [Cash Deposits]
      summary: Toggle include_in_analysis flag
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [include_in_analysis]
              properties:
                include_in_analysis:
                  type: boolean
      responses:
        "200":
          description: Flag toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───── SECURITIES ─────

  /api/v1/securities:
    get:
      operationId: listSecurities
      tags: [Securities]
      summary: Search/list securities master
      parameters:
        - name: q
          in: query
          description: Search by ticker, name, or alias
          schema:
            type: string
        - name: exchange
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
            enum: [KW, US]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, delisted, suspended]
            default: active
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Securities list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createSecurity
      tags: [Securities]
      summary: Add a new security to master
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityCreate"
      responses:
        "201":
          description: Security created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityResponse"
        "409":
          description: Security already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/securities/{security_id}:
    get:
      operationId: getSecurity
      tags: [Securities]
      summary: Get security detail with aliases
      parameters:
        - name: security_id
          in: path
          required: true
          schema:
            type: string
          example: KW_MABANEE
      responses:
        "200":
          description: Security detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateSecurity
      tags: [Securities]
      summary: Update security metadata
      parameters:
        - name: security_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityUpdate"
      responses:
        "200":
          description: Security updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/securities/{security_id}/aliases:
    get:
      operationId: listSecurityAliases
      tags: [Securities]
      summary: List aliases for a security
      parameters:
        - name: security_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Aliases list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SecurityAlias"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: addSecurityAlias
      tags: [Securities]
      summary: Add an alias to a security
      parameters:
        - name: security_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AliasCreate"
      responses:
        "201":
          description: Alias created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityAlias"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Alias already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/securities/resolve:
    get:
      operationId: resolveSymbol
      tags: [Securities]
      summary: Resolve user input to canonical security
      description: Searches symbol_mappings, security_aliases, and securities_master.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: "MABANEE"
      responses:
        "200":
          description: Resolved security
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityResponse"
        "404":
          description: No match found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ───── STOCKS (user's portfolio stocks) ─────

  /api/v1/stocks:
    get:
      operationId: listStocks
      tags: [Securities]
      summary: List user's stocks (with live prices)
      parameters:
        - $ref: "#/components/parameters/PortfolioFilter"
      responses:
        "200":
          description: Stocks list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── SNAPSHOTS & PERFORMANCE ─────

  /api/v1/snapshots/portfolio:
    get:
      operationId: getPortfolioSnapshots
      tags: [Snapshots]
      summary: Get portfolio performance time series
      description: Returns daily snapshots with portfolio value, TWR, MWRR, ROI.
      parameters:
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 365
            maximum: 1000
      responses:
        "200":
          description: Snapshot time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSnapshotListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/snapshots/positions:
    get:
      operationId: getPositionSnapshots
      tags: [Snapshots]
      summary: Get per-stock position snapshots
      parameters:
        - name: stock_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/PortfolioFilter"
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Position snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionSnapshotListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/snapshots/capture:
    post:
      operationId: captureSnapshot
      tags: [Snapshots]
      summary: Trigger snapshot capture for today
      description: Calculates and stores portfolio value, TWR, MWRR for the current date.
      responses:
        "201":
          description: Snapshot captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Snapshot already exists for today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/snapshots/performance:
    get:
      operationId: getPerformanceMetrics
      tags: [Snapshots]
      summary: Get performance summary (TWR, MWRR, ROI)
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1m, 3m, 6m, ytd, 1y, 3y, 5y, all]
            default: all
      responses:
        "200":
          description: Performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── PRICES ─────

  /api/v1/prices/update:
    post:
      operationId: triggerPriceUpdate
      tags: [Prices]
      summary: Trigger bulk price update
      description: Fetch latest prices from Yahoo Finance. Authenticated via cron key or JWT.
      security:
        - BearerAuth: []
        - CronKeyAuth: []
      parameters:
        - name: only_holdings
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Price update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceUpdateResponse"

  /api/v1/prices/{symbol}:
    get:
      operationId: getStockPrice
      tags: [Prices]
      summary: Get current price for a stock
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          example: MABANEE
      responses:
        "200":
          description: Current price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockPrice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/prices/{symbol}/history:
    get:
      operationId: getStockPriceHistory
      tags: [Prices]
      summary: Get price history for a stock
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            default: 30
            maximum: 365
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      symbol:
                        type: string
                      prices:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                            close:
                              type: number
                              format: double
                            source:
                              type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/prices/cron-status:
    get:
      operationId: getCronStatus
      tags: [Prices]
      summary: Get price scheduler status
      security: []
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronStatusResponse"

  # ───── AI ANALYST ─────

  /api/v1/ai/analyze:
    post:
      operationId: analyzePortfolio
      tags: [AI Analyst]
      summary: AI-powered portfolio analysis
      description: |
        Sends portfolio context to Google Gemini for analysis.
        Requires user's Gemini API key configured in profile.
        Rate limited to prevent abuse.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalysisRequest"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysisResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Gemini API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/ai/insights:
    get:
      operationId: getAIInsights
      tags: [AI Analyst]
      summary: Get cached AI insights
      parameters:
        - name: refresh
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Cached insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysisResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── PFM ─────

  /api/v1/pfm/snapshots:
    get:
      operationId: listPfmSnapshots
      tags: [PFM]
      summary: List PFM net-worth snapshots
      responses:
        "200":
          description: PFM snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PfmSnapshotListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createPfmSnapshot
      tags: [PFM]
      summary: Create a new PFM snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PfmSnapshotCreate"
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PfmSnapshotDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Snapshot already exists for this date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/pfm/snapshots/{id}:
    get:
      operationId: getPfmSnapshot
      tags: [PFM]
      summary: Get PFM snapshot detail (assets, liabilities, income/expenses)
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Full snapshot detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PfmSnapshotDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updatePfmSnapshot
      tags: [PFM]
      summary: Update PFM snapshot (replaces all items)
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PfmSnapshotCreate"
      responses:
        "200":
          description: Snapshot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PfmSnapshotDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deletePfmSnapshot
      tags: [PFM]
      summary: Delete a PFM snapshot (cascades to items)
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Snapshot deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───── PEER ANALYSIS ─────

  /api/v1/analysis/stocks:
    get:
      operationId: listAnalysisStocks
      tags: [Peer Analysis]
      summary: List stocks in analysis universe
      responses:
        "200":
          description: Analysis stocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AnalysisStock"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: addAnalysisStock
      tags: [Peer Analysis]
      summary: Add a stock to analysis universe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisStockCreate"
      responses:
        "201":
          description: Stock added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisStock"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Stock already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analysis/stocks/{id}/financials:
    get:
      operationId: getStockFinancials
      tags: [Peer Analysis]
      summary: Get financial statements for an analysis stock
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: statement_type
          in: query
          schema:
            type: string
            enum: [income, balance, cashflow]
      responses:
        "200":
          description: Financial statements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialStatementsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/analysis/stocks/{id}/metrics:
    get:
      operationId: getStockMetrics
      tags: [Peer Analysis]
      summary: Get calculated metrics for an analysis stock
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Stock metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMetricsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/analysis/compare:
    post:
      operationId: compareStocks
      tags: [Peer Analysis]
      summary: Compare multiple stocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stock_ids]
              properties:
                stock_ids:
                  type: array
                  items:
                    type: integer
                  minItems: 2
                  maxItems: 10
                metrics:
                  type: array
                  items:
                    type: string
                  description: Specific metrics to compare. Defaults to all.
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeerComparisonResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/analysis/uploads:
    post:
      operationId: uploadFinancialPdf
      tags: [Peer Analysis]
      summary: Upload financial PDF for extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, stock_id]
              properties:
                file:
                  type: string
                  format: binary
                stock_id:
                  type: integer
      responses:
        "202":
          description: Upload accepted, processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: processing
                  upload_id:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───── ADMIN ─────

  /api/v1/admin/backup/export:
    get:
      operationId: exportBackup
      tags: [Admin]
      summary: Export all user data as Excel
      description: Downloads an Excel workbook with all tables for the current user.
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/admin/backup/import:
    post:
      operationId: importBackup
      tags: [Admin]
      summary: Import data from Excel backup
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                mode:
                  type: string
                  enum: [merge, replace]
                  default: merge
                  description: merge=add missing, replace=wipe and reload
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/admin/integrity:
    get:
      operationId: checkIntegrity
      tags: [Admin]
      summary: Run data integrity checks
      description: |
        Checks: SQLite PRAGMA integrity_check, FK consistency,
        orphaned transactions, cash balance reconciliation,
        duplicate detection, schema version verification.
      responses:
        "200":
          description: Integrity report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityReport"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/admin/purge-deleted:
    delete:
      operationId: purgeDeleted
      tags: [Admin]
      summary: Permanently delete records older than 30 days
      description: Purges soft-deleted transactions and deposits past retention period.
      responses:
        "200":
          description: Purge result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: object
                    properties:
                      transactions_purged:
                        type: integer
                      deposits_purged:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────
components:

  # ───── SECURITY SCHEMES ─────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /api/v1/auth/login
    CronKeyAuth:
      type: apiKey
      in: header
      name: X-Cron-Key
      description: Server-side cron secret key

  # ───── PARAMETERS ─────
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    PortfolioFilter:
      name: portfolio
      in: query
      required: false
      schema:
        type: string
        enum: [KFH, BBYN, USA]

    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  # ───── RESPONSES ─────
  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: array
                items:
                  type: object
                  properties:
                    loc:
                      type: array
                      items:
                        type: string
                    msg:
                      type: string
                    type:
                      type: string

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ───── SCHEMAS ─────
  schemas:

    # --- Generic ---

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: "Not found"

    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # --- System ---

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        db_exists:
          type: boolean
        db_path:
          type: string

    # --- Auth ---

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 1
          maxLength: 200
          format: password

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 200
        password:
          type: string
          minLength: 8
          maxLength: 200
          format: password
        email:
          type: string
          format: email
        name:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          minLength: 8
          format: password

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        user_id:
          type: integer
        username:
          type: string
        name:
          type: string
          nullable: true

    UserInfo:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        name:
          type: string
          nullable: true

    # --- Portfolio ---

    PortfolioOverviewResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        data:
          $ref: "#/components/schemas/CompleteOverview"

    CompleteOverview:
      type: object
      properties:
        total_deposits:
          type: number
          format: double
          description: Total deposits in KWD
        total_withdrawals:
          type: number
          format: double
        net_deposits:
          type: number
          format: double
        total_invested:
          type: number
          format: double
        total_divested:
          type: number
          format: double
        total_dividends:
          type: number
          format: double
        total_fees:
          type: number
          format: double
        transaction_count:
          type: integer
        portfolio_value:
          type: number
          format: double
          description: Current market value in KWD
        cash_balance:
          type: number
          format: double
        total_value:
          type: number
          format: double
          description: portfolio_value + cash_balance
        total_gain:
          type: number
          format: double
        roi_percent:
          type: number
          format: double
        by_portfolio:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PortfolioBreakdown"
        portfolio_values:
          type: object
          additionalProperties:
            type: object
            properties:
              currency:
                type: string
              market_value:
                type: number
                format: double
              market_value_kwd:
                type: number
                format: double
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AccountRow"
        usd_kwd_rate:
          type: number
          format: double

    PortfolioBreakdown:
      type: object
      properties:
        portfolio_id:
          type: integer
        currency:
          type: string
        total_deposits:
          type: number
          format: double
        total_withdrawals:
          type: number
          format: double
        net_deposits:
          type: number
          format: double
        total_invested:
          type: number
          format: double
        total_divested:
          type: number
          format: double
        total_dividends:
          type: number
          format: double
        cash_balance:
          type: number
          format: double
        total_fees:
          type: number
          format: double
        transaction_count:
          type: integer

    HoldingsResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            holdings:
              type: array
              items:
                $ref: "#/components/schemas/HoldingRow"
            totals:
              $ref: "#/components/schemas/HoldingsTotals"
            usd_kwd_rate:
              type: number
              format: double
            count:
              type: integer

    PortfolioTableResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            portfolio:
              type: string
            currency:
              type: string
            holdings:
              type: array
              items:
                $ref: "#/components/schemas/HoldingRow"
            count:
              type: integer
            usd_kwd_rate:
              type: number
              format: double

    HoldingRow:
      type: object
      properties:
        company:
          type: string
        symbol:
          type: string
        shares_qty:
          type: number
          format: double
        avg_cost:
          type: number
          format: double
        total_cost:
          type: number
          format: double
        market_price:
          type: number
          format: double
        market_value:
          type: number
          format: double
        unrealized_pnl:
          type: number
          format: double
        realized_pnl:
          type: number
          format: double
        cash_dividends:
          type: number
          format: double
        reinvested_dividends:
          type: number
          format: double
        bonus_dividend_shares:
          type: number
          format: double
        dividend_yield_on_cost_pct:
          type: number
          format: double
        total_pnl:
          type: number
          format: double
        pnl_pct:
          type: number
          format: double
        currency:
          type: string
        market_value_kwd:
          type: number
          format: double
        unrealized_pnl_kwd:
          type: number
          format: double
        total_pnl_kwd:
          type: number
          format: double
        total_cost_kwd:
          type: number
          format: double
        weight_by_cost:
          type: number
          format: double
          description: Position weight as % of total portfolio cost
        weighted_dividend_yield_on_cost:
          type: number
          format: double

    HoldingsTotals:
      type: object
      properties:
        total_market_value_kwd:
          type: number
          format: double
        total_cost_kwd:
          type: number
          format: double
        total_unrealized_pnl_kwd:
          type: number
          format: double
        total_realized_pnl_kwd:
          type: number
          format: double
        total_pnl_kwd:
          type: number
          format: double
        total_dividends_kwd:
          type: number
          format: double

    AccountsResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            total_cash_kwd:
              type: number
              format: double
            accounts:
              type: array
              items:
                $ref: "#/components/schemas/AccountRow"

    AccountRow:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        balance:
          type: number
          format: double
        currency:
          type: string
        balance_kwd:
          type: number
          format: double
        last_reconciled:
          type: string
          format: date
          nullable: true
        portfolio_name:
          type: string
          nullable: true

    FxRateResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            usd_kwd:
              type: number
              format: double
            source:
              type: string

    # --- Transactions ---

    TransactionCreate:
      type: object
      required: [portfolio_id, txn_type, amount, txn_date]
      properties:
        portfolio_id:
          type: integer
          description: FK to portfolios.id
        txn_type:
          type: string
          enum: [BUY, SELL, DIVIDEND, BONUS, DEPOSIT, WITHDRAWAL]
        stock_id:
          type: integer
          nullable: true
          description: FK to stocks_master.id. Required for stock txns, null for cash.
        account_id:
          type: integer
          nullable: true
        shares:
          type: number
          format: double
          nullable: true
        price:
          type: number
          format: double
          nullable: true
        amount:
          type: number
          format: double
          description: "Signed: negative for buys, positive for sells/dividends"
        fees:
          type: number
          format: double
          default: 0
        txn_date:
          type: string
          format: date
        notes:
          type: string
          nullable: true
        source:
          type: string
          default: MANUAL
          description: "MANUAL, EXCEL_IMPORT, LEGACY_MIGRATION"

    TransactionUpdate:
