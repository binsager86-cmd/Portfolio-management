# Alembic configuration — Portfolio Mobile API

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# SQLite URL placeholder — overridden by env.py at runtime
sqlalchemy.url = sqlite:///../dev_portfolio.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
