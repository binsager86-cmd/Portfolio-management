# Docker Compose — Portfolio Mobile API
# Usage: docker compose up --build

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-api
    ports:
      - "8004:8004"
    environment:
      - ENVIRONMENT=production
      - DATABASE_PATH=/data/portfolio.db
      - SECRET_KEY=${SECRET_KEY:-change_this_to_a_random_string_before_production}
      - CRON_SECRET_KEY=${CRON_SECRET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:19006,http://localhost:8081}
      - PRICE_UPDATE_ENABLED=${PRICE_UPDATE_ENABLED:-true}
      - PRICE_UPDATE_HOUR=${PRICE_UPDATE_HOUR:-14}
      - PRICE_UPDATE_MINUTE=${PRICE_UPDATE_MINUTE:-0}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db-data:
    driver: local
